server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — redireciona tudo para index.html (necessário para React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets com hash (JS/CSS buildados pelo Vite)
    location ~* \.(js|css|woff2|woff|ttf|svg|ico|png|jpg|jpeg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sem cache para index.html (garante que o usuário receba o HTML mais recente)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Compressão gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;
}
